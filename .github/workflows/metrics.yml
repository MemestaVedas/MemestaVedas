name: Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
  push:
    branches: ['master', 'main']

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Metrics renderer
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
